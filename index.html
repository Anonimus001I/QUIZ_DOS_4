<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ ZOEIRO DO TRUTA • Qual dos 4 seus brothers vc é?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background: linear-gradient(180deg, #0a0000, #1a0000);
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 6px solid #ff0000;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.4rem;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 0 30px #ff0000;
        }
        
        .question-card {
            background: #111;
            border: 6px solid #ff0000;
            padding: 40px 30px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255,0,0,0.7);
        }
        
        .question-text {
            font-size: 1.45rem;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 0 0 15px #ff0000;
        }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .option-btn {
            background: #000;
            border: 4px solid #ff0000;
            color: #fff;
            padding: 25px 20px;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Press Start 2P', system-ui;
        }
        
        .option-btn:hover {
            background: #ff0000;
            color: #000;
            transform: scale(1.06);
        }
        
        .result-screen {
            text-align: center;
            padding: 60px 30px;
            background: #111;
            border: 8px solid #ff0000;
            animation: glitch 1.2s infinite alternate;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -4px); }
            100% { transform: translate(0); }
        }
        
        .result-name {
            font-size: 3.8rem;
            color: #ff0000;
            text-shadow: 0 0 40px #ff0000;
            margin: 20px 0;
            text-transform: uppercase;
        }
        
        .roast-text {
            font-size: 1.35rem;
            background: #000;
            padding: 35px;
            border: 4px dashed #ff0000;
            margin: 30px 0;
            line-height: 1.7;
            text-align: left;
        }
        
        button#restart {
            background: #000;
            color: #ff0000;
            border: 6px solid #ff0000;
            padding: 25px 80px;
            font-size: 1.5rem;
            cursor: pointer;
            margin-top: 40px;
            font-family: 'Press Start 2P';
        }
        
        button#restart:hover {
            background: #ff0000;
            color: #000;
        }
        
        .skull { font-size: 5rem; margin: 20px 0; animation: skull-float 2s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 QUIZ ZOEIRO DO TRUTA 🔥</h1>
            <p style="color:#ff6666; font-size:1.3rem;">Qual dos 4 FDP vc é?</p>
            <p style="color:#ff4444;">Humor sem limite • Prepare o cu</p>
        </header>

        <!-- TELA INICIAL -->
        <div id="start-screen">
            <div class="question-card" style="text-align:center;">
                <span class="skull">☠️</span>
                <h2 style="font-size:2.2rem; margin:20px 0;">AE CORNO, BEM-VINDO AO QUIZ-DOS 4 CAVALEIROS DO APOCALIPSE!</h2>
                <p style="font-size:1.3rem; margin-bottom:30px;">
                    10 seções de perguntas feitas pra destruir.<br>
                    Responde com sinceridade pra descobrir qual dos 4 você é.
                </p>
                <button onclick="startQuiz()" 
                        style="background:#ff0000; color:#000; border:6px solid #fff; padding:25px 100px; font-size:1.6rem; cursor:pointer;">
                    INICIAR A ZOEIRA PESADA
                </button>
            </div>
        </div>

        <!-- QUIZ -->
        <div id="quiz-screen" style="display:none;">
            <div class="question-card">
                <div style="text-align:center; margin-bottom:15px; color:#ff6666;">
                    SEÇÃO <span id="question-number">1</span>/10
                </div>
                <p id="question-text" class="question-text"></p>
                <div class="options" id="options-container"></div>
            </div>
        </div>

        <!-- RESULTADO -->
        <div id="result-screen" style="display:none;">
            <div class="result-screen">
                <span class="skull">💀</span>
                <h2 style="color:#ff6666; font-size:1.9rem;">PARABÉNS, SEU FILHO DA PUTA...</h2>
                <div id="result-name" class="result-name"></div>
                <div id="result-roast" class="roast-text"></div>
                
                <button id="restart" onclick="restartQuiz()">REINICIAR O QUIZ</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== NOMES DOS AMIGOS ====================
        const amigos = {
            0: "Inercio",
            1: "Sirleia",
            2: "Kardec",
            3: "Papai Natal"
        };

        // ==================== ROASTS FINAIS (ZOEIRA PESADA) ====================
        const roasts = {
            0: `VOCÊ É O INERCIO, O CARA QUE CAIU DA SACADA E AINDA TÁ CAINDO ATÉ HOJE KKKKKKK<br><br>
                Morreu caindo de uma sacada igual um pateta e mesmo assim continua sendo o mais inútil do grupo. 
                Provavelmente tropeçou no próprio pé enquanto tentava fugir de uma conta. 
                Até no além-túmulo deve tá deitado sem fazer porra nenhuma. 
                Inercio, o rei da queda livre e da preguiça eterna. Descansa em pedaços, truta.`,

            1: `VOCÊ É A SIRLEIA, A MAGRELA QUE PASSA FOME ATÉ NO CHURRASCO DOS OUTROS<br><br>
                Tão magra que parece que o vento vai levar embora. Já viu comida de longe e ficou salivando igual cachorro de rua. 
                Come menos que um passarinho anoréxico e ainda reclama que tá "inchada". 
                Se a fome fosse crime, Sirleia já tinha pegado prisão perpétua. 
                A única coisa mais vazia que teu estômago é tua geladeira, magrela do caralho.`,

            2: `VOCÊ É O KARDEC, O VELHO MAGRO E MORTO QUE AINDA RESPIRA POR TEIMOSIA<br><br>
                Parece um defunto que esqueceu de deitar no caixão. Magro, velho, seco e com cara de quem já morreu há 15 anos. 
                Quando ele tosse, sai poeira. Quando ele anda, parece que os ossos vão se quebrar. 
                Kardec é tão morto que o coveiro já reservou o buraco pra ele. 
                O zumbi mais sem graça da quebrada.`,

            3: `VOCÊ É O PAPAI NATAL, O VELHO TÃO VELHO QUE PARECE O PRÓPRIO PAPAI NOEL DE TÃO FODIDO<br><br>
                Barba branca, barriga grande, cara de quem já viu o dilúvio. Tá tão velho que quando ri parece que tá tendo um treco. 
                As crianças pedem presente e ele entrega dentadura. Já confundiram ele com o Papai Noel de verdade e pediram iPhone. 
                Papai Natal, o velho gagá que ainda acha que tá no Natal de 1978. Morre logo, véio!`
        };

        // ==================== PERGUNTAS ZOEIRAS ====================
        const questions = [
            {
                question: "Os trutas tão numa laje bebendo e alguém grita 'cuidado com a sacada!'. Qual sua reação?",
                options: [
                    "Tropeço no próprio pé e caio da sacada igual o Inercio (clássico)", 
                    "Fico com medo de cair e perco o apetite (já tô magra demais mesmo)", 
                    "Fico parado olhando porque já tô praticamente morto mesmo", 
                    "Falo que nessa idade cair da sacada é só mais um dia normal"
                ]
            },
            {
                question: "Tem só um pão dormido pra 4 pessoas. Como você reage?",
                options: [
                    "Nem ligo, tô morto mesmo, não preciso comer", 
                    "Pego o pão todo porque tô passando fome faz 3 semanas", 
                    "Deixo pra todo mundo, eu já tô seco e sem fome há décadas", 
                    "Falo que Papai Natal trouxe mais comida e escondo o pão"
                ]
            },
            {
                question: "Alguém pergunta: 'E aí, o que o Inercio tá fazendo agora?' Qual a resposta certa?",
                options: [
                    "Caindo da sacada de novo, o clássico nunca morre", 
                    "Nada, ele tá magro demais pra se mexer igual eu", 
                    "Deitado no caixão, igual eu vou estar daqui a pouco", 
                    "Perguntando se tem presente de Natal no além"
                ]
            },
            {
                question: "Você tá morrendo de fome, mas só tem uma coxinha. O que faz?",
                options: [
                    "Deixo cair da sacada sem querer (hábito)", 
                    "Devoro em 0,2 segundos porque tô morrendo de fome", 
                    "Nem consigo pegar, minha mão já tá ossuda demais", 
                    "Guardo pro Papai Natal que tá mais velho e precisa mais"
                ]
            },
            {
                question: "Os trutas tão zoando quem é o mais magro do grupo. Você diz:",
                options: [
                    "Eu nem ligo, tô morto caindo da sacada", 
                    "Sou eu, claro! Olha essa costela aparecendo!", 
                    "Sou eu, sou tão magro que pareço um esqueleto ambulante", 
                    "Eu sou gordo comparado com vocês, mas ainda sou velho pra caralho"
                ]
            },
            {
                question: "Chega a conta do rolê. Como você escapa?",
                options: [
                    "Caio da sacada pra não pagar (método Inercio)", 
                    "Falo que tô passando fome e não tenho nem pra pão", 
                    "Finjo que já morri pra não pagar nada", 
                    "Falo que Papai Natal paga tudo no final do ano"
                ]
            },
            {
                question: "Alguém pergunta sua idade. Qual a resposta mais honesta?",
                options: [
                    "Morreu com 27 caindo da sacada, idade eterna agora", 
                    "Tenho 19 mas pareço 40 de tão magra e destruída", 
                    "Tenho 87 mas pareço 120 de tão velho e seco", 
                    "Tenho 95 anos e ainda entrego presente de trenó"
                ]
            },
            {
                question: "Tem um buraco no chão. O que você faz?",
                options: [
                    "Caio dentro sem querer, igual o Inercio na sacada", 
                    "Olho e penso 'tomara que tenha comida lá embaixo'", 
                    "Deito dentro porque já tô praticamente morto", 
                    "Falo que é a chaminé da casa do Papai Natal"
                ]
            },
            {
                question: "Os trutas tão fazendo churrasco. Qual seu papel?",
                options: [
                    "Ficar olhando de baixo da sacada onde caí", 
                    "Ficar babando de longe porque tô passando fome", 
                    "Ficar sentado sem comer porque meu estômago já morreu", 
                    "Falar que Papai Natal trouxe linguiça do Polo Norte"
                ]
            },
            {
                question: "Última pergunta: se você pudesse escolher como morrer, qual seria?",
                options: [
                    "Caindo de uma sacada, pra manter a tradição do Inercio", 
                    "De fome, pra finalmente emagrecer de vez", 
                    "De velhice, porque já tô mais morto que vivo", 
                    "De tanto entregar presente, igual o verdadeiro Papai Natal"
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let scores = [0, 0, 0, 0]; // 0=Inercio, 1=Sirleia, 2=Kardec, 3=Papai Natal

        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            currentQuestionIndex = 0;
            scores = [0, 0, 0, 0];
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            
            document.getElementById('question-number').textContent = currentQuestionIndex + 1;
            document.getElementById('question-text').innerHTML = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((optionText, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = optionText;
                btn.onclick = () => selectAnswer(index);
                container.appendChild(btn);
            });
        }

        function selectAnswer(optionIndex) {
            scores[optionIndex]++;
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            let maxScore = Math.max(...scores);
            let winnerIndex = scores.indexOf(maxScore);
            
            document.getElementById('result-name').textContent = amigos[winnerIndex];
            document.getElementById('result-roast').innerHTML = roasts[winnerIndex];
        }

        function restartQuiz() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }
    </script>
</body>
</html>
